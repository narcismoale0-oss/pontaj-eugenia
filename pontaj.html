<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pontaj — Ore de muncă</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500;1,9..144,600&family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #ece5d5;
    --paper-dark: #ddd3ba;
    --ink: #232c26;
    --ink-soft: #4b5346;
    --stamp: #a13a2e;
    --gold: #a9822f;
    --muted: #8b8674;
    --line: rgba(35,44,38,0.16);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at top left, rgba(169,130,47,0.07), transparent 55%),
      var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
    padding:28px 16px 60px;
  }
  .wrap{max-width:760px;margin:0 auto;}

  /* header */
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.22em;
    color:var(--muted);
    text-transform:uppercase;
    margin:0 0 6px 2px;
  }
  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:20px;
    margin-bottom:26px;
    flex-wrap:wrap;
  }
  .month-row{display:flex;align-items:center;gap:14px;}
  .month-title{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:500;
    font-size:38px;
    letter-spacing:-0.01em;
    line-height:1;
  }
  .nav-btn{
    width:34px;height:34px;
    border-radius:50%;
    border:1px solid var(--line);
    background:transparent;
    color:var(--ink);
    font-size:16px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background 0.15s, transform 0.15s;
  }
  .nav-btn:hover{background:var(--paper-dark);}
  .nav-btn:active{transform:scale(0.92);}
  .nav-btn:focus-visible{outline:2px solid var(--gold); outline-offset:2px;}

  /* stamp */
  .stamp{
    width:106px;height:106px;
    border-radius:50%;
    border:2px solid var(--stamp);
    box-shadow: inset 0 0 0 4px rgba(161,58,46,0.12);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    transform:rotate(-7deg);
    color:var(--stamp);
    flex-shrink:0;
    background:rgba(161,58,46,0.03);
  }
  .stamp .n{
    font-family:'IBM Plex Mono', monospace;
    font-weight:700;
    font-size:26px;
    line-height:1;
  }
  .stamp .lbl{
    font-family:'IBM Plex Mono', monospace;
    font-size:8.5px;
    letter-spacing:0.12em;
    margin-top:4px;
    text-transform:uppercase;
    opacity:0.85;
  }

  /* calendar */
  .cal{
    background:rgba(255,255,255,0.28);
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px;
  }
  .dow{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    margin-bottom:8px;
  }
  .dow span{
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.08em;
    color:var(--muted);
    text-transform:uppercase;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:6px;
  }
  .cell{
    position:relative;
    aspect-ratio:1/1;
    border-radius:9px;
    border:1px solid var(--line);
    background:rgba(255,255,255,0.35);
    display:flex;flex-direction:column;
    padding:6px 0 0 8px;
    transition:background 0.15s, border-color 0.15s;
  }
  .cell.weekend{background:var(--paper-dark);}
  .cell.empty{border:none;background:transparent;}
  .cell.today{border-color:var(--gold); box-shadow:0 0 0 1px var(--gold);}
  .cell.filled{background:rgba(161,58,46,0.07); border-color:rgba(161,58,46,0.35);}
  .daynum{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--muted);
  }
  .cell.filled .daynum{color:var(--stamp);}
  .hour-input{
    border:none;
    background:transparent;
    width:100%;
    flex:1;
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size:16px;
    color:var(--ink);
    text-align:center;
    padding:0 8px 6px 0;
    appearance:textfield;
  }
  .hour-input::placeholder{color:transparent;}
  .cell:hover .hour-input::placeholder{color:rgba(139,134,116,0.5);}
  .hour-input::-webkit-outer-spin-button,
  .hour-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .hour-input:focus{outline:none;}
  .cell:focus-within{border-color:var(--gold); box-shadow:0 0 0 1px var(--gold);}

  /* footer stats */
  .stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-top:18px;
  }
  .stat{
    background:rgba(255,255,255,0.28);
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px 16px;
  }
  .stat .val{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size:22px;
    color:var(--ink);
  }
  .stat .lbl{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--muted);
    margin-top:3px;
  }

  .rate-row{
    display:flex;
    align-items:center;
    gap:14px;
    margin-top:12px;
    background:rgba(255,255,255,0.28);
    border:1px solid var(--line);
    border-radius:12px;
    padding:12px 16px;
    flex-wrap:wrap;
  }
  .rate-row label{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--muted);
  }
  .rate-field{
    display:flex;
    align-items:center;
    gap:6px;
    border-bottom:1px solid var(--line);
    padding-bottom:2px;
  }
  .rate-field input{
    width:64px;
    border:none;
    background:transparent;
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size:16px;
    color:var(--ink);
    text-align:right;
  }
  .rate-field input:focus{outline:none;}
  .rate-field .cur{
    font-size:11px;
    color:var(--muted);
  }
  .pay-total{
    margin-left:auto;
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  .pay-val{
    font-family:'IBM Plex Mono', monospace;
    font-weight:700;
    font-size:22px;
    color:var(--stamp);
  }
  .pay-lbl{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--muted);
  }

  .backup-row{
    display:flex;
    gap:10px;
    margin-top:14px;
    justify-content:center;
    flex-wrap:wrap;
  }
  .backup-btn{
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    letter-spacing:0.02em;
    color:var(--ink-soft);
    background:rgba(255,255,255,0.4);
    border:1px solid var(--line);
    border-radius:20px;
    padding:8px 16px;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    transition:background 0.15s, border-color 0.15s;
  }
  .backup-btn:hover{background:var(--paper-dark); border-color:var(--gold);}

  .hint{
    font-size:12px;
    color:var(--muted);
    margin-top:14px;
    text-align:center;
    line-height:1.5;
  }

  @media (max-width:520px){
    .month-title{font-size:28px;}
    .stamp{width:88px;height:88px;}
    .stamp .n{font-size:21px;}
    .hour-input{font-size:13px;}
    .stats{grid-template-columns:1fr 1fr;}
    .stats .stat:nth-child(3){grid-column:span 2;}
  }

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">Pontaj personal</p>
  <header>
    <div class="month-row">
      <button class="nav-btn" id="prevBtn" aria-label="Luna anterioară">‹</button>
      <div class="month-title" id="monthTitle">—</div>
      <button class="nav-btn" id="nextBtn" aria-label="Luna următoare">›</button>
    </div>
    <div class="stamp">
      <div class="n" id="stampTotal">0</div>
      <div class="lbl">ore luna</div>
    </div>
  </header>

  <div class="cal">
    <div class="dow" id="dow"></div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="stats">
    <div class="stat"><div class="val" id="statDays">0</div><div class="lbl">zile lucrate</div></div>
    <div class="stat"><div class="val" id="statTotal">0</div><div class="lbl">total ore</div></div>
    <div class="stat"><div class="val" id="statAvg">0</div><div class="lbl">medie ore/zi</div></div>
  </div>

  <div class="rate-row">
    <label for="rateInput">Rată pe oră</label>
    <div class="rate-field">
      <input type="number" id="rateInput" min="0" step="0.5" inputmode="decimal" placeholder="0">
      <span class="cur">lei/oră</span>
    </div>
    <div class="pay-total">
      <span class="pay-val" id="payTotal">0</span>
      <span class="pay-lbl">lei total lună</span>
    </div>
  </div>

  <div class="backup-row">
    <button class="backup-btn" id="exportBtn">⬇ Descarcă backup</button>
    <label class="backup-btn" for="importFile">⬆ Încarcă backup</label>
    <input type="file" id="importFile" accept="application/json" hidden>
  </div>

  <p class="hint">Apasă pe o zi și scrie orele lucrate. Se salvează automat în acest browser.<br>Descarcă un backup din când în când, ca să nu pierzi datele dacă schimbi browserul sau dispozitivul.</p>
</div>

<script>
const monthsRo = ["ianuarie","februarie","martie","aprilie","mai","iunie","iulie","august","septembrie","octombrie","noiembrie","decembrie"];
const dowLabels = ["L","Ma","Mi","J","V","S","D"];

let today = new Date();
let viewYear = today.getFullYear();
let viewMonth = today.getMonth(); // 0-indexed
let monthData = {}; // day -> hours

function storageKey(y,m){ return `ore:${y}-${String(m+1).padStart(2,'0')}`; }
const RATE_KEY = 'ore:rata';

function loadMonth(y,m){
  try{
    const raw = localStorage.getItem(storageKey(y,m));
    monthData = raw ? JSON.parse(raw) : {};
  }catch(e){
    monthData = {};
  }
}

function saveMonth(y,m){
  try{
    localStorage.setItem(storageKey(y,m), JSON.stringify(monthData));
  }catch(e){
    console.error('Eroare la salvare', e);
  }
}

function loadRate(){
  const raw = localStorage.getItem(RATE_KEY);
  return raw ? parseFloat(raw) : 0;
}

function saveRate(v){
  localStorage.setItem(RATE_KEY, v);
}

function daysInMonth(y,m){ return new Date(y, m+1, 0).getDate(); }

// Monday-first weekday index (0=Mon..6=Sun)
function mondayIndex(y,m,d){
  const jsDay = new Date(y,m,d).getDay(); // 0=Sun..6=Sat
  return (jsDay + 6) % 7;
}

function renderDow(){
  const dow = document.getElementById('dow');
  dow.innerHTML = '';
  dowLabels.forEach(l=>{
    const s = document.createElement('span');
    s.textContent = l;
    dow.appendChild(s);
  });
}

function renderCalendar(){
  document.getElementById('monthTitle').textContent = `${monthsRo[viewMonth]} ${viewYear}`;
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const total = daysInMonth(viewYear, viewMonth);
  const leadingEmpty = mondayIndex(viewYear, viewMonth, 1);

  for(let i=0;i<leadingEmpty;i++){
    const e = document.createElement('div');
    e.className = 'cell empty';
    grid.appendChild(e);
  }

  for(let d=1; d<=total; d++){
    const cell = document.createElement('div');
    const wIdx = mondayIndex(viewYear, viewMonth, d);
    const isWeekend = wIdx === 5 || wIdx === 6;
    const isToday = viewYear===today.getFullYear() && viewMonth===today.getMonth() && d===today.getDate();
    const val = monthData[d];
    cell.className = 'cell' + (isWeekend?' weekend':'') + (isToday?' today':'') + (val?' filled':'');

    const num = document.createElement('div');
    num.className = 'daynum';
    num.textContent = d;
    cell.appendChild(num);

    const input = document.createElement('input');
    input.className = 'hour-input';
    input.type = 'number';
    input.min = '0';
    input.max = '24';
    input.step = '0.5';
    input.placeholder = '–';
    input.inputMode = 'decimal';
    input.value = val ? val : '';
    input.setAttribute('aria-label', `Ore lucrate ziua ${d}`);

    input.addEventListener('change', ()=>{
      const num = parseFloat(input.value);
      if(!isNaN(num) && num > 0){
        monthData[d] = num;
      } else {
        delete monthData[d];
      }
      saveMonth(viewYear, viewMonth);
      renderCalendar();
      renderStats();
    });

    cell.appendChild(input);
    grid.appendChild(cell);
  }
}

function renderStats(){
  const values = Object.values(monthData).map(Number).filter(v=>v>0);
  const totalHours = values.reduce((a,b)=>a+b,0);
  const daysWorked = values.length;
  const avg = daysWorked ? (totalHours/daysWorked) : 0;

  document.getElementById('stampTotal').textContent = fmt(totalHours);
  document.getElementById('statDays').textContent = daysWorked;
  document.getElementById('statTotal').textContent = fmt(totalHours);
  document.getElementById('statAvg').textContent = fmt(avg);

  const rate = loadRate();
  const pay = totalHours * rate;
  document.getElementById('payTotal').textContent = fmt(pay);
}

function fmt(n){
  return (Math.round(n*10)/10).toString().replace('.', ',');
}

function goTo(y,m){
  if(m < 0){ m = 11; y -= 1; }
  if(m > 11){ m = 0; y += 1; }
  viewYear = y; viewMonth = m;
  loadMonth(viewYear, viewMonth);
  renderCalendar();
  renderStats();
}

document.getElementById('prevBtn').addEventListener('click', ()=>goTo(viewYear, viewMonth-1));
document.getElementById('nextBtn').addEventListener('click', ()=>goTo(viewYear, viewMonth+1));

const rateInput = document.getElementById('rateInput');
rateInput.value = loadRate() || '';
rateInput.addEventListener('change', ()=>{
  const v = parseFloat(rateInput.value) || 0;
  saveRate(v);
  renderStats();
});

function exportBackup(){
  const data = {};
  for(let i=0; i<localStorage.length; i++){
    const key = localStorage.key(i);
    if(key.startsWith('ore:')){
      data[key] = localStorage.getItem(key);
    }
  }
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  a.href = url;
  a.download = `pontaj-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function importBackup(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = JSON.parse(e.target.result);
      Object.keys(data).forEach(key=>{
        if(key.startsWith('ore:')){
          localStorage.setItem(key, data[key]);
        }
      });
      loadMonth(viewYear, viewMonth);
      renderCalendar();
      rateInput.value = loadRate() || '';
      renderStats();
      alert('Backup încărcat cu succes.');
    }catch(err){
      alert('Fișierul nu pare a fi un backup valid.');
    }
  };
  reader.readAsText(file);
}

document.getElementById('exportBtn').addEventListener('click', exportBackup);
document.getElementById('importFile').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(file) importBackup(file);
  e.target.value = '';
});

(function init(){
  renderDow();
  loadMonth(viewYear, viewMonth);
  renderCalendar();
  renderStats();
})();
</script>
</body>
</html>
